version: 2
updates:
- package-ecosystem: bun
  directory: /
  schedule:
    interval: weekly
    day: sunday
    time: 05:30
    timezone: Europe/Athens
  open-pull-requests-limit: 3
  versioning-strategy: increase
  groups:
    all-non-major:
      patterns:
      - '*'
      update-types:
      - patch
      - minor
  ignore:
  - dependency-name: vite
    update-types:
    - version-update:semver-major
  - dependency-name: knip
    update-types:
    - version-update:semver-major
  labels:
  - dependencies
  rebase-strategy: auto
  commit-message:
    prefix: chore
    include: scope
  cooldown:
    default-days: 3
    semver-minor-days: 7
    semver-major-days: 14
- package-ecosystem: github-actions
  directory: /
  schedule:
    interval: weekly
    day: sunday
    time: 05:45
    timezone: Europe/Athens
  open-pull-requests-limit: 2
  groups:
    github-actions:
      patterns:
      - '*'
  labels:
  - dependencies
  rebase-strategy: auto
  commit-message:
    prefix: chore
    include: scope
  cooldown:
    default-days: 3
    semver-minor-days: 7
